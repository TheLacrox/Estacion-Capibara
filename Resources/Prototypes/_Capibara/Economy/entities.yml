- type: entity
  id: CapibaraATM
  parent: [ BaseMachinePowered, ConstructibleMachine ]
  name: ATM
  description: A machine for managing your bank account. Withdraw and deposit Spesos.
  components:
  - type: CapibaraATM
    idSlot:
      name: capibara-atm-id-slot
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Machines/id_swipe.ogg
      ejectOnBreak: true
      swap: false
      whitelist:
        components:
        - IdCard
        - Pda
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      CapibaraATM-id: !type:ContainerSlot {}
      machine_board: !type:Container
      machine_parts: !type:Container
  - type: Sprite
    sprite: _Capibara/Structures/Machines/atm/atm.rsi
    layers:
    - state: icon
    - state: unshaded
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: Physics
    bodyType: Static
  - type: Transform
    noRot: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.45,0.25,0.45"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200
  - type: ActivatableUI
    key: enum.CapibaraATMUiKey.Key
    singleUser: true
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.CapibaraATMUiKey.Key:
        type: CapibaraATMBoundUserInterface
  - type: Anchorable
  - type: ApcPowerReceiver
    powerLoad: 200
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Repairable
    doAfterDelay: 8

- type: entity
  id: CapibaraSalaryConsole
  parent: BaseComputerAiAccess
  name: salary management console
  description: A console for managing crew salaries. Requires HOP or Captain authorization.
  components:
  - type: SalaryConsole
    privilegedIdSlot:
      name: capibara-salary-console-id-slot
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
      ejectOnBreak: true
      swap: false
      whitelist:
        components:
        - IdCard
        - Pda
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      board: !type:Container
      SalaryConsole-privilegedId: !type:ContainerSlot {}
  - type: AccessReader
    access: [["HeadOfPersonnel"], ["Captain"]]
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: id
    - map: ["computerLayerKeys"]
      state: id_key
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#3c5eb5"
  - type: ActivatableUI
    key: enum.SalaryConsoleUiKey.Key
    singleUser: true
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.SalaryConsoleUiKey.Key:
        type: SalaryConsoleBoundUserInterface
