# Commando (Deathsquad) Cyborg Chassis — admin-spawnable, very tanky borg with CentComm lawset
- type: entity
  id: BorgChassisDeathsquad
  parent: BaseBorgChassisNotIonStormable
  name: Commando Cyborg
  description: A man-machine hybrid that's equipped with the finest technology Nanotrasen could supply, this chassis is outfitted for one purpose and one purpose only, the complete annihilation of anything and everything in its path. Equipped with an energy sword, pulse rifle, and top-tier power cell, nothing can stand in its way for long.
  components:
  - type: Reactive
    groups:
      Acidic: [ Touch ]
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 5
    soundHit:
      collection: MetalThud
  - type: CombatMode
  - type: NoSlip
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 300
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 5
  - type: BorgTransponder
    name: Commando Cyborg
    sprite:
      sprite: Mobs/Silicon/chassis.rsi
      state: commando
  - type: Sprite
    layers:
    - state: commando
    - state: commando_e
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: commando_l
      shader: unshaded
      map: ["light"]
      visible: false
  - type: BorgChassis
    maxModules: 3
    hasMindState: commando_e
    noMindState: commando_e_r
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - BorgModuleCentComm
  - type: FlashImmunity
  - type: MobThresholds
    thresholds:
      0: Alive
      300: Critical
      350: Dead
    stateAlertDict:
      Alive: BorgHealth
      Critical: BorgCrit
      Dead: BorgDead
    showOverlays: false
    allowRevives: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 190
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/warning_buzzer.ogg
          params:
            volume: 5
    - trigger:
        !type:DamageTrigger
        damage: 750
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:EmptyContainersBehaviour
        containers:
        - borg_brain
        - cell_slot
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IntrinsicRadioTransmitter
    channels:
    - Common
    - Science
    - CentCom
    - Security
    - Command
  - type: ActiveRadio
    channels:
    - Common
    - Science
    - CentCom
    - Security
    - Command
  - type: ZombieImmune
  - type: Repairable
    doAfterDelay: 10
  - type: ContainerFill
    containers:
      borg_brain:
      - MMIFilled
      borg_module:
      - BorgModuleCommando
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMicroreactor
  - type: SiliconLawProvider
    laws: CentCommLawset
  - type: RandomMetadata
    nameSegments:
    - NamesBorg
  - type: NpcFactionMember
    factions:
    - NanoTrasen
  - type: Access
    enabled: false
    groups:
    - AllAccess
    tags:
    - Borg
    - CentralCommand
  - type: AccessReader
    access: [["Command"], ["Research"]]
  - type: ShowJobIcons
  - type: InteractionPopup
    interactSuccessString: petting-success-generic-cyborg
    interactFailureString: petting-failure-generic-cyborg
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
